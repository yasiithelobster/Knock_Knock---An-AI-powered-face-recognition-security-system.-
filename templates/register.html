<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Register Person</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body class="dark-body">
    <div class="container small-card">
        <h1>Register Person</h1>
        <p class="subtitle">Admin Protected Enrollment</p>

        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                {% for category, message in messages %}
                    <div class="flash {{ category }}">{{ message }}</div>
                {% endfor %}
            {% endif %}
        {% endwith %}

        <form method="POST" class="form-box">
            <input type="text" name="person_name" placeholder="Enter person's name" required>
            <button type="submit">Start Enrollment</button>
        </form>

        <a href="{{ url_for('dashboard') }}" class="back-link">← Back to Dashboard</a>
    </div>
</body>
</html>
