<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Knock Knock! Dashboard</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body class="dark-body">
    <div class="container">
        <h1>Knock Knock!</h1>
        <p class="subtitle">AI Face Recognition Security System</p>

        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                {% for category, message in messages %}
                    <div class="flash {{ category }}">{{ message }}</div>
                {% endfor %}
            {% endif %}
        {% endwith %}

        <div class="button-grid">
            <a href="{{ url_for('register') }}" class="nav-button">Register Person</a>

            <form action="{{ url_for('rebuild_database') }}" method="POST">
                <button type="submit" class="nav-button">Rebuild Face Database</button>
            </form>

            <form action="{{ url_for('start_access_gate') }}" method="POST">
                <button type="submit" class="nav-button">Start Access Gate</button>
            </form>

            <a href="{{ url_for('view_logs') }}" class="nav-button">View Logs</a>
            <a href="{{ url_for('logout') }}" class="nav-button secondary">Logout</a>
        </div>
    </div>
</body>
</html>
